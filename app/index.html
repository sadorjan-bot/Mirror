<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#111111">
<title>Mirror</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111111;--bg2:#181818;--bg3:#1f1f1f;--gold:#c9a96e;--gold2:rgba(201,169,110,0.12);--gold3:rgba(201,169,110,0.06);--text:#ededeb;--text2:#b0afa8;--text3:#787770;--bdr:rgba(255,255,255,0.08);--ok:#3dba7e;--err:#e05555;--r:10px;--r2:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:"Plus Jakarta Sans",sans-serif;color:var(--text);font-size:15px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
button:active{opacity:.85;transform:scale(.98);}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:2px;}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden;}
#hdr{padding:12px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px;}.logo span{color:var(--gold);}
.hdr-c{font-size:10px;color:var(--text3);}
.hdr-r{display:flex;align-items:center;gap:10px;}
.streak-w{text-align:center;}
.streak-ic{font-size:14px;display:block;}
.streak-v{font-size:9px;color:var(--err);font-weight:600;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gold);}
#content{flex:1;overflow:hidden;position:relative;}
.sc{display:none;height:100%;overflow-y:auto;padding:12px 14px 90px;}
.sc.on{display:block;}
.sc-chat{display:none;height:100%;flex-direction:column;}
.sc-chat.on{display:flex;}
#nav{border-top:1px solid var(--bdr);display:flex;flex-shrink:0;background:var(--bg);padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:9px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);border-top:2px solid transparent;transition:color .15s,border-color .15s;}
.nb.on{color:var(--gold);border-top-color:var(--gold);}
.nb-ic{font-size:15px;line-height:1;}
.nb-lb{font-size:9px;letter-spacing:.3px;}
.nb.on .nb-lb{font-weight:600;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:10px;}
.card.gold{border-color:rgba(201,169,110,.25);}
.cp{padding:13px 16px;}
.dvd{height:1px;background:var(--bdr);}
.sl{font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:12px 16px 6px;}
.pb{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.pb-f{height:100%;background:var(--gold);border-radius:2px;transition:width .8s;}
.ring-w{position:relative;width:88px;height:88px;}
.ring-w svg{position:absolute;top:0;left:0;}
.ring-c{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-sc{font-size:18px;font-weight:600;line-height:1;}
.ring-lb{font-size:8px;color:var(--gold);letter-spacing:1px;margin-top:2px;}
.rb{width:100%;padding:13px 16px;background:var(--bg2);border:1px dashed var(--bdr);border-radius:var(--r2);color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.rb-ic{color:var(--gold);font-size:12px;}
.sim-b{padding:11px 12px;border-radius:var(--r);margin-bottom:8px;cursor:pointer;}
.sim-b.bad{background:rgba(224,85,85,.06);border:1px solid rgba(224,85,85,.15);}
.sim-b.good{background:rgba(61,186,126,.06);border:1px solid rgba(61,186,126,.15);}
.sim-lb{font-size:10px;font-weight:600;letter-spacing:.8px;margin-bottom:5px;}
.sim-lb.bad{color:var(--err);}
.sim-lb.good{color:var(--ok);}
.sim-tx{font-size:12px;color:var(--text2);line-height:1.6;}
.sim-st{display:flex;gap:12px;margin-top:8px;font-size:11px;}
.fr{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.fb{padding:5px 13px;border-radius:99px;border:1px solid var(--bdr);background:transparent;color:var(--text3);font-size:11px;font-weight:500;}
.fb.on{border-color:var(--gold);background:var(--gold2);color:var(--gold);}
.dc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;cursor:pointer;margin-bottom:8px;}
.dc.tod{border-color:var(--gold);}
.dc.don{border-color:rgba(61,186,126,.2);}
.dh{padding:11px 14px;}
.dm{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.lp{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;}
.lp.r{background:rgba(61,186,126,.12);color:var(--ok);}
.lp.s{background:rgba(201,169,110,.12);color:var(--gold);}
.lp.i{background:rgba(224,85,85,.12);color:var(--err);}
.db{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.dt{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.dd{font-size:12px;color:var(--text2);line-height:1.55;}
.dck{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;}
.dck.don{background:rgba(61,186,126,.15);border-color:var(--ok);color:var(--ok);}
.drsp{border-top:1px solid var(--bdr);padding:10px 14px;}
.drsp textarea{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);color:var(--text);font-size:13px;padding:10px 12px;resize:none;outline:none;line-height:1.55;}
.drsp textarea:focus{border-color:rgba(201,169,110,.5);}
.bv{width:100%;margin-top:8px;padding:11px;background:var(--gold);color:#000;border-radius:var(--r);font-size:13px;font-weight:600;}
.bv:disabled{background:rgba(201,169,110,.2);color:var(--text3);}
.cfb{border-top:1px solid var(--bdr);padding:11px 14px;background:rgba(201,169,110,.04);}
.cfb-lb{font-size:10px;color:var(--gold);letter-spacing:.8px;margin-bottom:7px;}
.cfb-tx{font-size:13px;color:var(--text);line-height:1.6;}
.cfb-nx{margin-top:10px;padding:9px 11px;background:var(--bg3);border-radius:var(--r);border-left:2px solid var(--gold);}
.cfb-nx-lb{font-size:10px;color:var(--gold);margin-bottom:4px;}
.cfb-nx-tx{font-size:12px;color:var(--text2);line-height:1.5;}
.pc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:8px;cursor:pointer;}
.pc.pop{border-color:var(--ok);}
.pb2{padding:6px 14px;font-size:10px;font-weight:600;letter-spacing:.5px;}
.pb2.pop{background:rgba(61,186,126,.08);border-bottom:1px solid rgba(61,186,126,.2);color:var(--ok);}
.p-body{padding:14px;}
.p-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.p-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.5px;display:inline-block;margin-bottom:5px;}
.p-nm{font-size:15px;font-weight:600;line-height:1.2;}
.p-sb{font-size:11px;color:var(--text3);margin-top:2px;}
.p-pr{font-size:18px;font-weight:700;line-height:1;}
.p-pe{font-size:9px;color:var(--text3);margin-top:2px;}
.p-ds{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:8px;}
.p-tr{font-size:11px;color:var(--text3);background:var(--bg3);padding:7px 10px;border-radius:var(--r);margin-bottom:10px;line-height:1.4;}
.p-fs{display:none;margin-bottom:10px;}
.p-fs.on{display:block;}
.p-fi{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px;color:var(--text);line-height:1.4;}
.p-bts{display:flex;gap:6px;}
.bd{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--bdr);color:var(--text2);border-radius:var(--r);font-size:11px;font-weight:500;}
.bg{flex:2;padding:10px;color:#000;border-radius:var(--r);font-size:11px;font-weight:700;}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.am{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 8px;text-align:center;cursor:pointer;}
.am.cur{background:var(--gold2);border-color:var(--gold);}
.am-ic{font-size:18px;margin-bottom:4px;}
.am-nm{font-size:9px;color:var(--text3);line-height:1.3;}
.am.cur .am-nm{color:var(--gold);font-weight:600;}
.ac{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:8px;cursor:pointer;}
.a-bd{padding:12px 14px;}
.a-ti{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:6px;color:var(--text);}
.a-ex{font-size:12px;color:var(--text2);line-height:1.6;}
.a-dt{font-size:10px;color:var(--text3);}
.mr{display:flex;align-items:flex-end;gap:7px;}
.mr.user{justify-content:flex-end;}
.mv{width:26px;height:26px;border-radius:50%;background:var(--gold2);border:1px solid rgba(201,169,110,.25);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold);flex-shrink:0;}
.mb{max-width:82%;padding:10px 13px;font-size:13px;line-height:1.6;}
.mr.ai .mb{background:var(--bg3);border-radius:16px 16px 16px 4px;color:var(--text);}
.mr.user .mb{background:var(--gold);border-radius:16px 16px 4px 16px;color:#000;}
.ty{display:flex;gap:4px;padding:10px 13px;background:var(--bg3);border-radius:16px 16px 16px 4px;}
.td{width:5px;height:5px;border-radius:50%;background:var(--text3);}
.sg{padding:9px 13px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);color:var(--text2);font-size:12px;text-align:left;width:100%;margin-bottom:5px;}
#ci{flex:1;padding:10px 13px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);color:var(--text);font-size:13px;outline:none;}
#ci:focus{border-color:rgba(201,169,110,.5);}
#cs{width:40px;height:40px;border-radius:var(--r);background:var(--gold);color:#000;font-size:17px;flex-shrink:0;}
#cs:disabled{background:var(--bg3);color:var(--text3);}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:8px 12px 12px;}
.dr{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--bg3);border-radius:6px;}
.dbar{width:32px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;}
.dv{font-size:11px;font-weight:600;min-width:20px;text-align:right;}
.bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;}
.bi{text-align:center;opacity:.28;}
.bi.ok{opacity:1;}
.bc{width:46px;height:46px;border-radius:50%;background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;margin:0 auto 5px;font-size:18px;}
.bi.ok .bc{background:var(--gold2);border-color:rgba(201,169,110,.3);}
.bn{font-size:9px;color:var(--text3);line-height:1.3;}
.bi.ok .bn{color:var(--text2);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;overflow-y:auto;padding:20px;display:none;}
.ov.on{display:block;}
.ob{max-width:500px;margin:0 auto;background:#181818;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
.oc{padding:20px 20px 4px;}
.ocl{width:calc(100% - 40px);margin:0 20px 24px;padding:12px;background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--bdr);border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer;}
.m-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;display:inline-block;margin-bottom:12px;}
.m-ti{font-size:17px;font-weight:700;line-height:1.25;margin-bottom:6px;color:var(--text);}
.m-su{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px;}
.m-sl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.m-st{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:14px;}
.m-in{padding:10px 14px;background:rgba(201,169,110,.06);border-left:2px solid var(--gold);border-radius:0 8px 8px 0;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.65;font-style:italic;}
.m-ac{padding:10px 14px;background:rgba(61,186,126,.06);border:1px solid rgba(61,186,126,.2);border-radius:8px;font-size:13px;color:var(--text);line-height:1.65;margin-bottom:14px;}
.m-br{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.m-brf{height:100%;border-radius:2px;}
.m-sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.m-sv{padding:12px;border-radius:10px;text-align:center;}
.m-svv{font-size:22px;font-weight:700;line-height:1;}
.m-svl{font-size:10px;color:var(--text3);margin-top:3px;}
.m-mo{padding:10px 12px;background:rgba(255,255,255,.02);border-radius:8px;margin-bottom:6px;border:1px solid rgba(255,255,255,.05);}
.m-mo.gd{background:rgba(61,186,126,.03);border-color:rgba(61,186,126,.1);}
.m-mo-lb{font-size:10px;font-weight:600;margin-bottom:3px;}
.m-mo-tx{font-size:12px;color:var(--text3);line-height:1.6;}
.m-mo.gd .m-mo-tx{color:var(--text2);}
.sh-bx{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:28px;width:100%;max-width:320px;text-align:center;margin:0 auto;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">Mirror<span>.</span></div>
    <div class="hdr-c">Thomas &middot; Strat&egrave;ge &middot; J+3</div>
    <div class="hdr-r">
      <div class="streak-w"><span class="streak-ic">&#x1F525;</span><span class="streak-v">3j</span></div>

  <div id="content">

    <button class="nb" onclick="go('biblio')"><span class="nb-ic">&#9673;</span><span class="nb-lb">Biblio</span></button>
    <button class="nb" onclick="go('plans')"><span class="nb-ic">&#9671;</span><span class="nb-lb">Plans</span></button>
    <button class="nb" onclick="go('chat')"><span class="nb-ic">&#9633;</span><span class="nb-lb">Coach</span></button>
  </div>
</div>

<div class="ov" id="mod-main">
  <div class="ob">
    <div id="mod-inner"></div>
    <button class="ocl" onclick="cm2('mod-main')">Fermer</button>
  </div>
</div>
<div class="ov" id="mod-art">
  <div class="ob">
    <div id="art-inner"></div>
    <button class="ocl" onclick="cm2('mod-art')">Fermer</button>
  </div>
</div>
<div class="ov" id="mod-share">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div class="sh-bx">
      <div style="font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:14px;">mirror.</div>
      <div style="font-size:40px;color:var(--gold);margin-bottom:8px;">&#9672;</div>
      <div style="font-size:48px;font-weight:700;line-height:1;">67<span style="font-size:14px;color:var(--text3)">/100</span></div>
      <div style="font-size:14px;color:var(--gold);margin:5px 0 3px;">Strat&egrave;ge</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:18px;font-style:italic;">Et toi, tu es qui vraiment ?<br>mirror.eter.ai</div>
      <div style="display:grid;gap:7px;">
        <button style="padding:11px;background:var(--bg3);color:var(--text);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;font-family:inherit;">Instagram Stories</button>
        <button style="padding:11px;background:var(--bg3);color:var(--text);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;font-family:inherit;">TikTok</button>
        <button style="padding:11px;background:var(--bg3);color:var(--text);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;font-family:inherit;">X (Twitter)</button>
        <button onclick="cm2('mod-share')" style="padding:8px;color:var(--text3);font-size:12px;font-family:inherit;margin-top:4px;">Fermer</button>
      </div>
    </div>
  </div>
</div>

function mkRing(score){
  var r=34,c=2*Math.PI*r,id="rng"+Date.now();
  var w=dv("ring-w");
  ih(w,'<svg width="88" height="88" viewBox="0 0 88 88"><circle cx="44" cy="44" r="34" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/><circle id="'+id+'-a" cx="44" cy="44" r="34" fill="none" stroke="#c9a96e" stroke-width="5" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+c.toFixed(1)+'" stroke-linecap="round" transform="rotate(-90 44 44)"/></svg>');
  var rc=dv("ring-c"); ih(rc,'<div class="ring-sc" id="'+id+'-n">0</div><div class="ring-lb">EVEIL</div>');
  w.appendChild(rc);
  setTimeout(function(){
    var arc=qs(id+"-a"),num=qs(id+"-n");
    if(!arc||!num) return;
    var t0=null,dur=1400;
    function step(ts){ if(!t0)t0=ts; var p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,3); arc.style.strokeDashoffset=(c-(e*(score/100)*c)).toFixed(2); num.textContent=Math.round(e*score); if(p<1)requestAnimationFrame(step); }
    requestAnimationFrame(step);
  },120);
  return w;
}

// RADAR
function mkRadar(dims){
  var keys=Object.keys(dims),vals=Object.values(dims),sz=180,cx=sz/2,cy=sz/2,r=sz/2-28,n=keys.length;
  var ang=function(i){return Math.PI*2*i/n-Math.PI/2;};

  var dpts=vals.map(function(v,i){return pt(i,(v/100)*r);});
  var dp=dpts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ")+" Z";
  var out=['<svg width="180" height="180" viewBox="0 0 180 180" style="display:block;margin:0 auto">'];
  [.25,.5,.75,1].forEach(function(l){ var gp=keys.map(function(_,i){return pt(i,r*l);}); out.push('<path d="'+gp.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ")+" Z"+'" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>'); });
  keys.forEach(function(_,i){ var e=pt(i,r); out.push('<line x1="'+cx+'" y1="'+cy+'" x2="'+e.x.toFixed(1)+'" y2="'+e.y.toFixed(1)+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>'); });
  out.push('<path d="'+dp+'" fill="rgba(201,169,110,.1)" stroke="#c9a96e" stroke-width="1.5"/>');
  dpts.forEach(function(p,i){ out.push('<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" fill="#c9a96e"/>'); });
  keys.forEach(function(k,i){ var lp=pt(i,r+18),v=vals[i],col=v>=70?"#3dba7e":v>=50?"#c9a96e":"#e05555"; out.push('<text x="'+lp.x.toFixed(1)+'" y="'+(lp.y-3).toFixed(1)+'" text-anchor="middle" style="font-size:8px;fill:rgba(255,255,255,.35);font-family:Plus Jakarta Sans">'+k+'</text><text x="'+lp.x.toFixed(1)+'" y="'+(lp.y+8).toFixed(1)+'" text-anchor="middle" style="font-size:10px;fill:'+col+';font-family:Plus Jakarta Sans;font-weight:600">'+v+'</text>'); });
  out.push("</svg>");
  var w=dv(""); ih(w,out.join("")); return w.firstChild;
}

async function sendChat(text){
  if(!text||!text.trim()||ST.cnt>=5||ST.clod) return;
  var msg=text.trim(); ST.cmsg.push({role:"user",text:msg}); ST.cnt++; ST.clod=true; rChat();
  try{
    var hist=ST.cmsg.slice(1).map(function(m){return{role:m.role==="user"?"user":"assistant",content:m.text};});
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:280,system:"Coach IA de Mirror. "+D.user.name+", "+D.user.archetype+", score "+D.user.score+"/100. Direct, bienveillant, max 2 phrases. Francais.",messages:hist})});
    var data=await res.json(); ST.cmsg.push({role:"ai",text:(data.content&&data.content[0]&&data.content[0].text)||"Connexion indisponible."});
  }catch(e){ST.cmsg.push({role:"ai",text:"Connexion indisponible."});}
  ST.clod=false; rChat();
}

rRap();
